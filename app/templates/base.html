<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job Finder{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-slate-900 text-white">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-lg font-semibold">Job Finder</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/runs" class="hover:underline">Scrape history</a>
        <form action="/scrape" method="post">
          <button type="submit"
            class="bg-emerald-500 hover:bg-emerald-600 px-3 py-1.5 rounded font-medium disabled:opacity-50"
            {% if scraping %}disabled{% endif %}>
            {% if scraping %}Scraping…{% else %}Scrape now{% endif %}
          </button>
        </form>
      </nav>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
